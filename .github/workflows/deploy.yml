# ============================================================================
# Multi-Cloud CI/CD — GitHub Actions
# ============================================================================
name: Deploy RL Autoscaler

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  TF_VERSION: '1.6.0'

jobs:
  # ─── Lint & Test ─────────────────────────────────────────────────────────
  lint-and-test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check rl_agent/ firebase_bridge/ cloud_functions/

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ─── Terraform Validate ──────────────────────────────────────────────────
  terraform-validate:
    name: 🏗️ Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

  # ─── Build Dashboard ────────────────────────────────────────────────────
  build-dashboard:
    name: 🎨 Build Dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build
        working-directory: dashboard
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist

  # ─── Deploy AWS ──────────────────────────────────────────────────────────
  deploy-aws:
    name: ☁️ Deploy AWS
    needs: [lint-and-test, terraform-validate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Apply (AWS only)
        working-directory: terraform
        run: |
          terraform init
          terraform apply -target=module.aws -auto-approve \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}"

  # ─── Deploy GCP ──────────────────────────────────────────────────────────
  deploy-gcp:
    name: 🌐 Deploy GCP
    needs: [lint-and-test, terraform-validate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Apply (GCP only)
        working-directory: terraform
        run: |
          terraform init
          terraform apply -target=module.gcp -auto-approve \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}"

  # ─── Deploy Firebase ─────────────────────────────────────────────────────
  deploy-firebase:
    name: 🔥 Deploy Firebase
    needs: [build-dashboard, lint-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live
          entryPoint: dashboard
